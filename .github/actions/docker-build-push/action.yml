name: Docker Build and Push
description: Set up Docker Buildx, log in to GHCR, and build/push an image

inputs:
  file:
    required: true
    description: Path to Dockerfile
  tags:
    required: true
    description: Newline-separated image tags
  build-args:
    required: false
    description: Newline-separated build args
    default: ""
  cache-from:
    required: false
    description: cache-from value for buildx
    default: ""
  push:
    required: false
    description: Whether to push the image
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.file }}
        platforms: linux/amd64
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        build-args: ${{ inputs.build-args }}
        cache-from: ${{ inputs.cache-from }}
